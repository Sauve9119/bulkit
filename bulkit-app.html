<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bulk It — App</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --blue-950:#0d1f33; --blue-800:#153a5c; --blue-600:#1f5a8a;
    --sand-100:#f3ede0; --sand-200:#e9dfc9;
    --mustard-500:#e0a530; --mustard-600:#c98a1c;
    --ink-900:#1a1d21; --ledger-green:#3d6b4f; --white:#fffdf8;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Inter',sans-serif;background:var(--sand-100);color:var(--ink-900);}
  .mono{font-family:'IBM Plex Mono',monospace;}
  h1,h2,h3,.display{font-family:'Space Grotesk',sans-serif;}
  .shell{max-width:1100px;margin:0 auto;min-height:100vh;background:var(--white);box-shadow:0 0 60px rgba(13,31,51,0.08);}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid rgba(21,58,92,0.12);background:var(--blue-950);color:var(--white);}
  .logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:18px;}
  .logo-mark{width:28px;height:28px;border-radius:7px;background:var(--mustard-500);color:var(--blue-950);display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono';font-weight:700;font-size:13px;}
  .role-switch{display:flex;background:rgba(255,255,255,0.1);border-radius:100px;padding:3px;}
  .role-btn{padding:7px 16px;border-radius:100px;font-size:13px;font-weight:600;color:rgba(255,255,255,0.7);cursor:pointer;}
  .role-btn.active{background:var(--mustard-500);color:var(--blue-950);}

  /* STORE OWNER VIEW */
  .view{display:none;}
  .view.active{display:block;}
  .layout{display:grid;grid-template-columns:1fr 340px;gap:0;}
  @media(max-width:820px){.layout{grid-template-columns:1fr;}}
  .catalog{padding:22px 24px;}
  .cat-tabs{display:flex;gap:8px;overflow-x:auto;padding-bottom:14px;margin-bottom:16px;border-bottom:1px solid rgba(21,58,92,0.1);}
  .cat-tab{white-space:nowrap;padding:8px 16px;border-radius:100px;border:1.5px solid rgba(21,58,92,0.18);font-size:13.5px;font-weight:600;color:var(--blue-800);cursor:pointer;}
  .cat-tab.active{background:var(--blue-800);color:var(--white);border-color:var(--blue-800);}
  .product-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;}
  @media(max-width:560px){.product-grid{grid-template-columns:1fr;}}
  .product-card{border:1px solid rgba(21,58,92,0.12);border-radius:12px;padding:16px;}
  .p-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;}
  .p-name{font-weight:600;font-size:14.5px;color:var(--blue-950);}
  .p-vendor{font-size:11.5px;color:#8a8f95;margin-top:2px;}
  .p-price{font-family:'IBM Plex Mono';font-weight:600;color:var(--ledger-green);font-size:15px;}
  .p-unit{font-size:11px;color:#8a8f95;}
  .p-actions{display:flex;align-items:center;justify-content:space-between;margin-top:12px;}
  .qty-ctrl{display:flex;align-items:center;gap:10px;border:1px solid rgba(21,58,92,0.2);border-radius:8px;padding:4px 10px;}
  .qty-ctrl button{background:none;border:none;font-size:16px;color:var(--blue-800);cursor:pointer;width:20px;}
  .qty-ctrl span{min-width:18px;text-align:center;font-family:'IBM Plex Mono';font-size:13px;}
  .add-btn{background:var(--blue-800);color:var(--white);border:none;padding:8px 14px;border-radius:7px;font-size:12.5px;font-weight:600;cursor:pointer;}

  .cart-panel{background:var(--sand-100);border-left:1px solid rgba(21,58,92,0.12);padding:22px;}
  .cart-panel h3{font-size:15px;color:var(--blue-950);margin-bottom:14px;}
  .cart-line{display:flex;justify-content:space-between;font-size:13.5px;padding:9px 0;border-bottom:1px dashed rgba(21,58,92,0.15);}
  .cart-empty{font-size:13.5px;color:#8a8f95;padding:20px 0;text-align:center;}
  .cart-total{display:flex;justify-content:space-between;font-weight:700;padding-top:12px;margin-top:8px;border-top:2px solid var(--blue-950);font-family:'IBM Plex Mono';}
  .place-order{width:100%;background:var(--mustard-500);color:var(--blue-950);border:none;padding:13px;border-radius:9px;font-weight:700;font-size:14px;margin-top:16px;cursor:pointer;}
  .place-order:disabled{opacity:0.4;cursor:not-allowed;}

  .orders-section{padding:0 24px 24px;}
  .orders-section h3{font-size:15px;color:var(--blue-950);margin:20px 0 12px;}
  .order-card{border:1px solid rgba(21,58,92,0.12);border-radius:10px;padding:14px 16px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;}
  .order-id{font-family:'IBM Plex Mono';font-size:12px;color:#8a8f95;}
  .order-status{font-size:12px;font-weight:600;padding:5px 10px;border-radius:100px;}
  .status-placed{background:#fdf1d9;color:var(--mustard-600);}
  .status-transit{background:#e6f0f9;color:var(--blue-600);}
  .status-delivered{background:#e5f2e8;color:var(--ledger-green);}

  /* VENDOR VIEW */
  .vendor-wrap{padding:24px;}
  .stat-row{display:flex;gap:16px;margin-bottom:24px;flex-wrap:wrap;}
  .stat-box{flex:1;min-width:150px;background:var(--sand-100);border-radius:12px;padding:18px;}
  .stat-box b{font-family:'Space Grotesk';font-size:24px;color:var(--blue-950);display:block;}
  .stat-box span{font-size:12px;color:#6b7076;}
  table{width:100%;border-collapse:collapse;font-size:13.5px;}
  th{text-align:left;color:#6b7076;font-size:11.5px;text-transform:uppercase;letter-spacing:0.04em;padding:10px 8px;border-bottom:1px solid rgba(21,58,92,0.15);}
  td{padding:12px 8px;border-bottom:1px solid rgba(21,58,92,0.08);}
  .badge{padding:4px 10px;border-radius:100px;font-size:11.5px;font-weight:600;}
  .toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(120%);background:var(--blue-950);color:var(--white);padding:14px 22px;border-radius:10px;font-size:14px;font-weight:500;transition:transform .3s ease;z-index:100;}
  .toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <div class="logo"><div class="logo-mark">bIt</div>Bulk It</div>
    <div class="role-switch">
      <div class="role-btn active" data-role="owner">Shop owner</div>
      <div class="role-btn" data-role="vendor">Vendor</div>
    </div>
  </div>

  <!-- OWNER VIEW -->
  <div class="view active" id="view-owner">
    <div class="layout">
      <div class="catalog">
        <div class="cat-tabs" id="catTabs"></div>
        <div class="product-grid" id="productGrid"></div>
      </div>
      <div class="cart-panel">
        <h3>Current order · <span class="mono" id="cartCount">0 items</span></h3>
        <div id="cartLines"><div class="cart-empty">Your cart is empty — add products to build today's order.</div></div>
        <div class="cart-total"><span>Total</span><span id="cartTotal">₹0</span></div>
        <button class="place-order" id="placeOrderBtn" disabled>Place order</button>
      </div>
    </div>
    <div class="orders-section">
      <h3>Recent orders</h3>
      <div id="ordersList"></div>
    </div>
  </div>

  <!-- VENDOR VIEW -->
  <div class="view" id="view-vendor">
    <div class="vendor-wrap">
      <div class="stat-row">
        <div class="stat-box"><b id="vOrders">0</b><span>Orders today</span></div>
        <div class="stat-box"><b id="vGmv">₹0</b><span>GMV today</span></div>
        <div class="stat-box"><b>4.8★</b><span>Store rating</span></div>
        <div class="stat-box"><b>92%</b><span>On-time delivery</span></div>
      </div>
      <h3 style="font-size:15px;color:var(--blue-950);margin-bottom:12px;">Incoming orders</h3>
      <table>
        <thead><tr><th>Order</th><th>Store</th><th>Items</th><th>Amount</th><th>Status</th></tr></thead>
        <tbody id="vendorTable"></tbody>
      </table>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const PRODUCTS = [
  {id:1,cat:"Groceries",name:"Aashirvaad Atta 50kg",vendor:"Shree Ganesh Traders",price:1780,unit:"per bag"},
  {id:2,cat:"Groceries",name:"Toor Dal 25kg",vendor:"Rajasthan Dal Mill",price:3120,unit:"per bag"},
  {id:3,cat:"Groceries",name:"Basmati Rice 25kg",vendor:"Marwar Foods",price:2450,unit:"per bag"},
  {id:4,cat:"FMCG",name:"Surf Excel Carton (12x1kg)",vendor:"HUL Distributor Jodhpur",price:2160,unit:"per carton"},
  {id:5,cat:"FMCG",name:"Parle-G Carton (100pkt)",vendor:"Parle Regional Depot",price:1050,unit:"per carton"},
  {id:6,cat:"FMCG",name:"Colgate Toothpaste (48x200g)",vendor:"Colgate Distributor",price:3840,unit:"per carton"},
  {id:7,cat:"Household",name:"Refined Sunflower Oil 15L",vendor:"Sunrise Oil Traders",price:2280,unit:"per tin"},
  {id:8,cat:"Household",name:"LED Bulb Pack (20x9W)",vendor:"Bajaj Electricals Depot",price:1140,unit:"per pack"},
  {id:9,cat:"Baby Care",name:"Pampers Diapers Carton",vendor:"P&G Distributor",price:4320,unit:"per carton"},
  {id:10,cat:"Baby Care",name:"Cerelac Carton (24x300g)",vendor:"Nestlé Depot Rajasthan",price:3600,unit:"per carton"},
];
const CATS = ["All","Groceries","FMCG","Household","Baby Care"];
let activeCat = "All";
let cart = {}; // id -> qty
let orders = [];
let orderCounter = 1042;

function fmt(n){ return "₹" + n.toLocaleString('en-IN'); }

function renderCatTabs(){
  const el = document.getElementById('catTabs');
  el.innerHTML = CATS.map(c => `<div class="cat-tab ${c===activeCat?'active':''}" data-cat="${c}">${c}</div>`).join('');
  el.querySelectorAll('.cat-tab').forEach(t=>t.addEventListener('click', ()=>{ activeCat = t.dataset.cat; renderCatTabs(); renderProducts(); }));
}

function renderProducts(){
  const grid = document.getElementById('productGrid');
  const list = activeCat==="All" ? PRODUCTS : PRODUCTS.filter(p=>p.cat===activeCat);
  grid.innerHTML = list.map(p => `
    <div class="product-card">
      <div class="p-top">
        <div><div class="p-name">${p.name}</div><div class="p-vendor">${p.vendor}</div></div>
      </div>
      <div class="p-price mono">${fmt(p.price)} <span class="p-unit">${p.unit}</span></div>
      <div class="p-actions">
        <div class="qty-ctrl">
          <button onclick="changeQty(${p.id},-1)">−</button>
          <span id="qty-${p.id}">${cart[p.id]||0}</span>
          <button onclick="changeQty(${p.id},1)">+</button>
        </div>
        <button class="add-btn" onclick="addToCart(${p.id})">Add</button>
      </div>
    </div>
  `).join('');
}

function changeQty(id, delta){
  const current = cart[id] || 0;
  const next = Math.max(0, current + delta);
  document.getElementById('qty-'+id).textContent = next;
  cart['_pending_'+id] = next;
}
function addToCart(id){
  const pending = cart['_pending_'+id];
  const qty = pending !== undefined ? pending : 1;
  if(qty<=0){ showToast("Set a quantity first"); return; }
  cart[id] = qty;
  renderCart();
  showToast("Added to order");
}

function renderCart(){
  const lines = Object.keys(cart).filter(k=>!k.startsWith('_pending_') && cart[k]>0);
  const cartLines = document.getElementById('cartLines');
  const cartCount = document.getElementById('cartCount');
  const cartTotal = document.getElementById('cartTotal');
  const placeBtn = document.getElementById('placeOrderBtn');

  if(lines.length===0){
    cartLines.innerHTML = '<div class="cart-empty">Your cart is empty — add products to build today\'s order.</div>';
    cartCount.textContent = "0 items";
    cartTotal.textContent = fmt(0);
    placeBtn.disabled = true;
    return;
  }
  let total = 0;
  cartLines.innerHTML = lines.map(id=>{
    const p = PRODUCTS.find(pr=>pr.id==id);
    const qty = cart[id];
    const lineTotal = p.price*qty;
    total += lineTotal;
    return `<div class="cart-line"><span>${p.name} × ${qty}</span><span class="mono">${fmt(lineTotal)}</span></div>`;
  }).join('');
  cartCount.textContent = lines.length + " item" + (lines.length>1?"s":"");
  cartTotal.textContent = fmt(total);
  placeBtn.disabled = false;
}

function placeOrder(){
  const lines = Object.keys(cart).filter(k=>!k.startsWith('_pending_') && cart[k]>0);
  if(lines.length===0) return;
  let total = 0;
  const itemNames = [];
  lines.forEach(id=>{
    const p = PRODUCTS.find(pr=>pr.id==id);
    total += p.price*cart[id];
    itemNames.push(p.name+" ×"+cart[id]);
  });
  const order = { id: "BLK-"+orderCounter++, items: itemNames, total, status: "placed" };
  orders.unshift(order);
  cart = {};
  renderProducts(); renderCart(); renderOrders(); renderVendorTable();
  showToast("Order "+order.id+" placed!");

  setTimeout(()=>{ order.status="transit"; renderOrders(); renderVendorTable(); }, 4000);
  setTimeout(()=>{ order.status="delivered"; renderOrders(); renderVendorTable(); }, 9000);
}

function statusLabel(s){
  if(s==="placed") return ['Order placed','status-placed'];
  if(s==="transit") return ['Out for delivery','status-transit'];
  return ['Delivered','status-delivered'];
}

function renderOrders(){
  const el = document.getElementById('ordersList');
  if(orders.length===0){ el.innerHTML = '<div class="cart-empty">No orders yet — place your first order above.</div>'; return; }
  el.innerHTML = orders.map(o=>{
    const [label, cls] = statusLabel(o.status);
    return `<div class="order-card"><div><div class="order-id">${o.id}</div><div style="font-size:13.5px;margin-top:3px;">${o.items.length} item(s) · <span class="mono">${fmt(o.total)}</span></div></div><div class="order-status ${cls}">${label}</div></div>`;
  }).join('');
}

function renderVendorTable(){
  const tbody = document.getElementById('vendorTable');
  document.getElementById('vOrders').textContent = orders.length;
  document.getElementById('vGmv').textContent = fmt(orders.reduce((s,o)=>s+o.total,0));
  if(orders.length===0){ tbody.innerHTML = '<tr><td colspan="5" style="color:#8a8f95;">No orders yet.</td></tr>'; return; }
  tbody.innerHTML = orders.map(o=>{
    const [label, cls] = statusLabel(o.status);
    return `<tr><td class="mono">${o.id}</td><td>Sharma Kirana Store</td><td>${o.items.length}</td><td class="mono">${fmt(o.total)}</td><td><span class="badge ${cls}">${label}</span></td></tr>`;
  }).join('');
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

document.getElementById('placeOrderBtn').addEventListener('click', placeOrder);
document.querySelectorAll('.role-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.role-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('view-'+btn.dataset.role).classList.add('active');
  });
});

renderCatTabs(); renderProducts(); renderCart(); renderOrders(); renderVendorTable();
</script>
</body>
</html>
