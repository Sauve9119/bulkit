version: "3.8"

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/bulkit
      JWT_SECRET: change_this_secret
      CLIENT_URL: http://localhost:5173
    depends_on:
      - mongo

volumes:
  mongo_data:
